<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF JOD 2X PANEL</title>
    <style>
        body {
            background-color: #0b0b13;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 15px;
            box-sizing: border-box;
        }

        /* 🌀 ১ম স্ক্রিন: ডট-ডট ঘোরানো অরিজিনাল লোডার */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b13;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        /* ডট স্পিনারের সুন্দর অ্যানিমেশন */
        .dot-spinner {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .dot-spinner div {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffcc;
            animation: dotFade 1.2s linear infinite;
        }

        .dot-spinner div:nth-child(1) { top: 6px; left: 27px; animation-delay: 0s; }
        .dot-spinner div:nth-child(2) { top: 12px; left: 42px; animation-delay: -0.15s; }
        .dot-spinner div:nth-child(3) { top: 27px; left: 48px; animation-delay: -0.3s; }
        .dot-spinner div:nth-child(4) { top: 42px; left: 42px; animation-delay: -0.45s; }
        .dot-spinner div:nth-child(5) { top: 48px; left: 27px; animation-delay: -0.6s; }
        .dot-spinner div:nth-child(6) { top: 42px; left: 12px; animation-delay: -0.75s; }
        .dot-spinner div:nth-child(7) { top: 27px; left: 6px; animation-delay: -0.9s; }
        .dot-spinner div:nth-child(8) { top: 12px; left: 12px; animation-delay: -1.05s; }

        @keyframes dotFade {
            0%, 100% { opacity: 1; transform: scale(1.2); }
            50% { opacity: 0.25; transform: scale(0.8); }
        }

        .loader-text {
            margin-top: 25px;
            color: #00ffcc;
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }

        /* 📊 শুরুতে আসা লোডিং প্রোগ্রেস বার (দাগ) */
        .start-progress-container {
            width: 180px;
            height: 6px;
            background-color: #1b1b3a;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #333;
            overflow: hidden;
        }
        
        .start-progress-bar {
            width: 0%;
            height: 100%;
            background-color: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
            border-radius: 10px;
        }

        /* 📱 ২য় স্ক্রিন: নাম দেওয়ার মেইন বক্স */
        .panel-box {
            background: #121224;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            display: none;
        }

        /* 🔐 ③য় স্ক্রিন: পাসওয়ার্ড বক্স */
        #login-box {
            background: #121224;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            display: none;
        }
        
        h2 { 
            margin-top: 0;
            margin-bottom: 10px; 
            font-size: 28px;
            text-shadow: 0 0 10px; 
        }
        .cyan-text { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .pink-text { color: #ff007f; text-shadow: 0 0 10px #ff007f; }

        p {
            font-size: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1b1b3a;
            color: white;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            font-size: 18px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        button {
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-cyan { background: #00ffcc; color: #121224; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        .btn-pink { background: #ff007f; color: white; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .btn-copy { background: #ffcc00; color: black; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); display: none; }

        .progress-container {
            width: 100%;
            background-color: #1b1b3a;
            border-radius: 10px;
            margin: 20px auto 0 auto;
            display: none;
            border: 1px solid #333;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background-color: #ff007f;
            border-radius: 10px;
            box-shadow: 0 0 10px #ff007f;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="dot-spinner">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
        <div class="loader-text" id="startProgressText">LOADING... 0%</div>
        
        <div class="start-progress-container">
            <div class="start-progress-bar" id="startBar"></div>
        </div>
    </div>

    <div class="panel-box" id="mainPanel">
        <h2 class="cyan-text">FF JOD 2X</h2>
        <p id="statusText" style="color: #aaa;">Status: Secure Connection Established</p>
        <input type="text" id="userName" placeholder="Enter Your Name">
        <br>
        <button id="startBtn" class="btn-cyan">START INJECTION</button>
        <button id="copyBtn" class="btn-copy">COPY GENERATED KEY</button>

        <div class="progress-container" id="progressBarContainer">
            <div class="progress-bar" id="myBar"></div>
        </div>
    </div>

    <div id="login-box">
        <h2 class="pink-text">SECURITY LOCK</h2>
        <p id="loginStatus" style="color: #aaa;">Enter Password To Decrypt Key</p>
        <input type="password" id="panelPassword" placeholder="Password Here">
        <br>
        <button id="loginBtn" class="btn-pink">VERIFY & GENERATE</button>
    </div>

    <script>
        const loaderContainer = document.getElementById('loader-container');
        const mainPanel = document.getElementById('mainPanel');
        const loginBox = document.getElementById('login-box');
        
        const startBar = document.getElementById('startBar');
        const startProgressText = document.getElementById('startProgressText');

        const button = document.getElementById('startBtn');
        const copyBtn = document.getElementById('copyBtn');
        const input = document.getElementById('userName');
        const statusText = document.getElementById('statusText');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const myBar = document.getElementById('myBar');

        const loginBtn = document.getElementById('loginBtn');
        const panelPassword = document.getElementById('panelPassword');
        const loginStatus = document.getElementById('loginStatus');

        let savedName = ""; 

        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3');
        bgMusic.loop = true;

        // ⏱️ শুরুতে লোডিং দাগটি ০% থেকে ১০০% করার লজিক
        let initialWidth = 0;
        let startLoaderInterval = setInterval(() => {
            if (initialWidth >= 100) {
                clearInterval(startLoaderInterval);
                
                // ১০০% হওয়ার পর মেইন প্যানেল চলে আসবে
                loaderContainer.style.opacity = '0';
                setTimeout(() => {
                    loaderContainer.style.display = 'none';
                    mainPanel.style.display = 'block';
                }, 500);
            } else {
                initialWidth++;
                startBar.style.width = initialWidth + '%';
                startProgressText.innerText = "LOADING... " + initialWidth + "%";
            }
        }, 35); // ৩.৫ সেকেন্ড ফিক্সড টাইমিং এর জন্য স্পীড সেট করা

        // বাটন ও ইনজেকশন লজিক
        button.addEventListener('click', function() {
            savedName = input.value.trim(); 
            
            if(savedName === "") {
                alert("দয়া করে আগে আপনার নাম লিখুন বস!");
            } else {
                bgMusic.play().catch(e => console.log("Audio play blocked"));
                statusText.innerText = "Welcome, " + savedName + " ! Overriding Matrix...";
                statusText.style.color = "#00ffcc"; 
                
                button.innerText = "OPENING SECURE GATEWAY...";
                button.style.background = "#222";
                button.style.color = "#555";
                button.disabled = true; 

                progressBarContainer.style.display = "block";
                
                let width = 0;
                let id = setInterval(frame, 20); 
                
                function frame() {
                    if (width >= 100) {
                        clearInterval(id);
                        
                        setTimeout(() => {
                            mainPanel.style.display = 'none';
                            loginBox.style.display = 'block';
                        }, 800);

                    } else {
                        width++;
                        myBar.style.width = width + '%';
                        statusText.innerText = "Bypassing... " + width + "%";
                    }
                }
            }
        });

        loginBtn.addEventListener('click', function() {
            const pass = panelPassword.value.trim();
            
            if(pass === "JOD2X") {
                loginStatus.innerText = "ACCESS GRANTED! DECRYPTING KEY...";
                loginStatus.style.color = "#00ffcc";
                loginBtn.disabled = true;
                
                setTimeout(() => {
                    loginBox.style.display = 'none';
                    mainPanel.style.display = 'block';
                    
                    let randomChar = Math.random().toString(36).substring(2, 6).toUpperCase();
                    let randomNum = Math.random().toString(36).substring(7, 11).toUpperCase();
                    let finalKey = "JOD-" + randomChar + "-" + randomNum;
                    
                    statusText.innerText = "SUCCESS! KEY GENERATED FOR " + savedName.toUpperCase();
                    statusText.style.color = "#00ffcc";
                    
                    input.value = finalKey; 
                    
                    button.style.display = "none";
                    copyBtn.style.display = "block"; 
                }, 1500);

            } else {
                loginStatus.innerText = "WRONG PASSWORD! ACCESS DENIED";
                loginStatus.style.color = "red";
                panelPassword.value = "";
            }
        });

        copyBtn.addEventListener('click', function() {
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            alert("বস! কীটি কপি করা হয়েছে: " + input.value);
        });
    </script>

</body>
</html>
