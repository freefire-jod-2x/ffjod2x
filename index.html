<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF JOD 2X PANEL</title>
    <style>
        body {
            background-color: #05050a;
            color: white;
            font-family: 'Courier New', Courier, monospace; /* হ্যাকার ফন্ট */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 15px;
            box-sizing: border-box;
        }

        /* 🏴‍☠️ ১ম স্ক্রিন: হ্যাকার গ্লিচ ও শেক লোডার */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            /* স্ক্রিন কাঁপানোর জন্য শেক অ্যানিমেশন */
            animation: hackerShake 0.4s infinite alternate;
        }
        
        /* ওপি সায়ান স্পিনার */
        .circle-loader {
            width: 75px;
            height: 75px;
            border: 5px solid rgba(0, 255, 204, 0.05);
            border-left-color: #00ffcc;
            border-right-color: #ff0055; /* হ্যাকার ডুয়াল কালার ইফেক্ট */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5), 0 0 15px rgba(255, 0, 85, 0.3);
            position: relative;
        }

        /* গ্লিচ ইফেক্টের ছায়া */
        .circle-loader::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 5px solid transparent;
            border-top-color: #00ffcc;
            opacity: 0.6;
            animation: spin 1.5s linear infinite reverse;
        }

        .loader-text {
            margin-top: 30px;
            color: #00ffcc;
            font-size: 18px;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 2px 2px #ff0055; /* রেড-গ্রিন গ্লিচ শ্যাডো */
            animation: textBlink 0.15s infinite alternate;
        }

        /* 📱 ২য় স্ক্রিন: নাম দেওয়ার মেইন বক্স */
        .panel-box {
            background: #0d0d1a;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            display: none;
        }

        /* 🔐 ৩য় স্ক্রিন: পাসওয়ার্ড ভেরিফিকেশন বক্স */
        #login-box {
            background: #0d0d1a;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            display: none;
        }
        
        h2 { 
            margin-top: 0;
            margin-bottom: 10px; 
            font-size: 28px;
            text-shadow: 0 0 10px; 
        }
        .cyan-text { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .pink-text { color: #ff007f; text-shadow: 0 0 10px #ff007f; }

        p {
            font-size: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #222;
            background: #14142a;
            color: white;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            font-size: 18px;
            font-family: monospace;
            transition: 0.3s;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        button {
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
            font-family: monospace;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-cyan { background: #00ffcc; color: #121224; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        .btn-pink { background: #ff007f; color: white; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .btn-copy { background: #ffcc00; color: black; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); display: none; }

        .progress-container {
            width: 100%;
            background-color: #14142a;
            border-radius: 10px;
            margin: 20px auto 0 auto;
            display: none;
            border: 1px solid #222;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background-color: #ff007f;
            border-radius: 10px;
            box-shadow: 0 0 10px #ff007f;
            transition: width 0.1s linear;
        }

        /* 🎬 অ্যানিমেশন ইফেক্টস */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* গ্লিচ টেক্সট ব্লিংক */
        @keyframes textBlink {
            0% { opacity: 0.9; transform: skewX(-2deg); }
            50% { opacity: 1; transform: skewX(2deg); }
            100% { opacity: 0.8; transform: skewX(0deg); }
        }

        /* হ্যাকার কাঁপানো (Shake) ইফেক্ট */
        @keyframes hackerShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            40% { transform: translate(-2px, 0px) rotate(0.5deg); }
            60% { transform: translate(1px, 2px) rotate(0deg); }
            80% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            100% { transform: translate(2px, -1px) rotate(0.5deg); }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="circle-loader"></div>
        <div class="loader-text" id="loadingText">BYPASSING FIREWALL...</div>
    </div>

    <div class="panel-box" id="mainPanel">
        <h2 class="cyan-text">FF JOD 2X</h2>
        <p id="statusText" style="color: #aaa;">Status: Secure Connection Established</p>
        <input type="text" id="userName" placeholder="Enter Your Name">
        <br>
        <button id="startBtn" class="btn-cyan">START INJECTION</button>
        <button id="copyBtn" class="btn-copy">COPY GENERATED KEY</button>

        <div class="progress-container" id="progressBarContainer">
            <div class="progress-bar" id="myBar"></div>
        </div>
    </div>

    <div id="login-box">
        <h2 class="pink-text">SECURITY LOCK</h2>
        <p id="loginStatus" style="color: #aaa;">Enter Password To Decrypt Key</p>
        <input type="password" id="panelPassword" placeholder="Password Here">
        <br>
        <button id="loginBtn" class="btn-pink">VERIFY & GENERATE</button>
    </div>

    <script>
        const loaderContainer = document.getElementById('loader-container');
        const mainPanel = document.getElementById('mainPanel');
        const loginBox = document.getElementById('login-box');
        const loadingText = document.getElementById('loadingText');
        
        const button = document.getElementById('startBtn');
        const copyBtn = document.getElementById('copyBtn');
        const input = document.getElementById('userName');
        const statusText = document.getElementById('statusText');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const myBar = document.getElementById('myBar');

        const loginBtn = document.getElementById('loginBtn');
        const panelPassword = document.getElementById('panelPassword');
        const loginStatus = document.getElementById('loginStatus');

        let savedName = ""; 

        const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3');
        bgMusic.loop = true;

        // হ্যাকার লোডিং টেক্সট চেঞ্জিং ইফেক্ট
        const phrases = ["INJECTING EXPLOIT...", "BYPASSING SECURITY...", "LOADING FF JOD 2X..."];
        let count = 0;
        let textInterval = setInterval(() => {
            if(count < phrases.length) {
                loadingText.innerText = phrases[count];
                count++;
            }
        }, 1200);

        // ৩.৬ সেকেন্ড পর লোডার বন্ধ হয়ে প্যানেল ওপেন হবে
        setTimeout(() => {
            clearInterval(textInterval);
            loaderContainer.style.opacity = '0';
            setTimeout(() => {
                loaderContainer.style.display = 'none';
                mainPanel.style.display = 'block';
            }, 500);
        }, 3600);

        button.addEventListener('click', function() {
            savedName = input.value.trim(); 
            
            if(savedName === "") {
                alert("দয়া করে আগে আপনার নাম লিখুন বস!");
            } else {
                bgMusic.play().catch(e => console.log("Audio play blocked"));
                statusText.innerText = "Welcome, " + savedName + " ! Overriding Matrix...";
                statusText.style.color = "#00ffcc"; 
                
                button.innerText = "OPENING SECURE GATEWAY...";
                button.style.background = "#222";
                button.style.color = "#555";
                button.disabled = true; 

                progressBarContainer.style.display = "block";
                
                let width = 0;
                let id = setInterval(frame, 20); 
                
                function frame() {
                    if (width >= 100) {
                        clearInterval(id);
                        
                        setTimeout(() => {
                            mainPanel.style.display = 'none';
                            loginBox.style.display = 'block';
                        }, 800);

                    } else {
                        width++;
                        myBar.style.width = width + '%';
                        statusText.innerText = "Bypassing... " + width + "%";
                    }
                }
            }
        });

        loginBtn.addEventListener('click', function() {
            const pass = panelPassword.value.trim();
            
            if(pass === "JOD2X") {
                loginStatus.innerText = "ACCESS GRANTED! DECRYPTING KEY...";
                loginStatus.style.color = "#00ffcc";
                loginBtn.disabled = true;
                
                setTimeout(() => {
                    loginBox.style.display = 'none';
                    mainPanel.style.display = 'block';
                    
                    let randomChar = Math.random().toString(36).substring(2, 6).toUpperCase();
                    let randomNum = Math.random().toString(36).substring(7, 11).toUpperCase();
                    let finalKey = "JOD-" + randomChar + "-" + randomNum;
                    
                    statusText.innerText = "SUCCESS! KEY GENERATED FOR " + savedName.toUpperCase();
                    statusText.style.color = "#00ffcc";
                    
                    input.value = finalKey; 
                    
                    button.style.display = "none";
                    copyBtn.style.display = "block"; 
                }, 1500);

            } else {
                loginStatus.innerText = "WRONG PASSWORD! ACCESS DENIED";
                loginStatus.style.color = "red";
                panelPassword.value = "";
            }
        });

        // কপি বাটন লজিক
        copyBtn.addEventListener('click', function() {
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            alert("বস! কীটি কপি করা হয়েছে: " + input.value);
        });
    </script>

</body>
</html>
